[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  # SUPABASE_URL nie je tajomstvo — je to verejný projektový subdomain.
  # Obálkové obrázky článkov (cover_image) sú verejné Supabase Storage URL,
  # ktoré tento subdomain nutne obsahujú, a legitímne sa prerendrujú do dist/.
  # Netlify secret scanner ich inak označí ako leak a zhodí build.
  # Skutočné tajomstvo (SUPABASE_SERVICE_ROLE_KEY) sa do klienta nebundluje a
  # ostáva scanované — omitujeme len tento jeden necitlivý kľúč.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

# 301 — pôvodné top-level SEO stránky presunuté pod /poradna (Ink 13).
# Musia byť PRED SPA fallbackom, inak ich /* prebije.
[[redirects]]
  from = "/analyza-krmiva-pre-psa"
  to = "/poradna/analyza-krmiva-pre-psa/"
  status = 301
  force = true

[[redirects]]
  from = "/digitalny-zdravotny-pas-pre-psa"
  to = "/poradna/digitalny-zdravotny-pas-pre-psa/"
  status = 301
  force = true

[[redirects]]
  from = "/ockovanie-psa"
  to = "/poradna/ockovanie-psa/"
  status = 301
  force = true

[[redirects]]
  from = "/odcervenie-psa"
  to = "/poradna/odcervenie-psa/"
  status = 301
  force = true

[[redirects]]
  from = "/alergia-na-krmivo-u-psa"
  to = "/poradna/alergia-na-krmivo-u-psa/"
  status = 301
  force = true

[[redirects]]
  from = "/co-nesmie-pes-jest"
  to = "/poradna/co-nesmie-pes-jest/"
  status = 301
  force = true

# SPA fallback — BrowserRouter routy (/login, /profily, …) musia vracať index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
