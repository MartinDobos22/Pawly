[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

# 301 — pôvodné top-level SEO stránky presunuté pod /poradna (Ink 13).
# Musia byť PRED SPA fallbackom, inak ich /* prebije.
[[redirects]]
  from = "/analyza-krmiva-pre-psa"
  to = "/poradna/analyza-krmiva-pre-psa"
  status = 301
  force = true

[[redirects]]
  from = "/digitalny-zdravotny-pas-pre-psa"
  to = "/poradna/digitalny-zdravotny-pas-pre-psa"
  status = 301
  force = true

[[redirects]]
  from = "/ockovanie-psa"
  to = "/poradna/ockovanie-psa"
  status = 301
  force = true

[[redirects]]
  from = "/odcervenie-psa"
  to = "/poradna/odcervenie-psa"
  status = 301
  force = true

[[redirects]]
  from = "/alergia-na-krmivo-u-psa"
  to = "/poradna/alergia-na-krmivo-u-psa"
  status = 301
  force = true

[[redirects]]
  from = "/co-nesmie-pes-jest"
  to = "/poradna/co-nesmie-pes-jest"
  status = 301
  force = true

# SPA fallback — BrowserRouter routy (/login, /profily, …) musia vracať index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
