<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1B5E20" />
  <meta name="description" content="GranuleCheck – Inteligentná analýza zloženia psích granúl" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GranuleCheck" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <title>Animal Passport</title>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      const isDevServer = location.port === "5173" || location.hostname === "127.0.0.1" || location.hostname === "localhost";
      if (isDevServer) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map((registration) => registration.unregister()));
        return;
      }

      navigator.serviceWorker.register('/sw.js').then(
              (reg) => console.log('SW registered:', reg.scope),
              (err) => console.log('SW registration failed:', err)
      );
    });
  }
</script>
</body>
</html>
