      content="Pawly – digitálny zdravotný pas pre tvojho miláčika. AI analýza krmiva a karta pre veterinára."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pawly" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pawly — Zdravotný pas pre tvojho miláčika" />
    <meta
      property="og:description"
      content="Pawly – digitálny zdravotný pas pre tvojho miláčika. AI analýza krmiva a karta pre veterinára."
    />
    <meta property="og:image" content="/branding/pawly-banner.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pawly" />
    <meta name="twitter:image" content="/branding/pawly-banner.png" />

    <title>Pawly — Zdravotný pas pre tvojho miláčika</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          const isDevServer =
            location.port === '5173' ||
            location.hostname === '127.0.0.1' ||
            location.hostname === 'localhost';
          if (isDevServer) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
            return;
          }

          navigator.serviceWorker.register('/sw.js').then(
            (reg) => console.log('SW registered:', reg.scope),
            (err) => console.log('SW registration failed:', err)
          );
        });
      }
    </script>
  </body>
</html>
