<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F4C5C" />
    <title>Pawly – Offline</title>
    <script>
      (function () {
        var lang = (navigator.language || 'sk').toLowerCase().slice(0, 2) === 'en' ? 'en' : 'sk';
        document.documentElement.lang = lang;
        document.addEventListener('DOMContentLoaded', function () {
          document.querySelectorAll('[data-' + lang + ']').forEach(function (el) {
            el.textContent = el.getAttribute('data-' + lang);
          });
        });
      })();
    </script>
    <!--
      Farby sú zámerne hard-coded (offline.html nemôže importovať theme.ts —
      slúži pred načítaním JS bundle). MUSIA byť ručne zladené s client/src/theme.ts
      pri každom palette change. Mapping:
        --bg-light:    lightSurface.default      (#FAF7F2)
        --ink-light:   light.text.primary        (#1A2A2F)
        --accent:      light.palette.primary     (#0F4C5C)
        --bg-dark:     darkSurface.default       (#1A1F22)
        --ink-dark:    dark.text.primary         (#E6EDEF)
        --accent-dark: dark.palette.primary      (#6FBED1)
    -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', 'Roboto', 'Helvetica', 'Arial', sans-serif;
        background: #faf7f2;
        color: #1a2a2f;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
      }
      .container {
        max-width: 400px;
      }
      .icon {
        font-size: 72px;
        margin-bottom: 24px;
        opacity: 0.6;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 12px;
        color: #0f4c5c;
      }
      p {
        font-size: 1rem;
        line-height: 1.6;
        color: #4a5a60;
        margin-bottom: 32px;
      }
      button {
        background: #0f4c5c;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px 32px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #0c3f4d;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1f22;
          color: #e6edef;
        }
        p {
          color: #b8c1c3;
        }
        h1 {
          color: #6fbed1;
        }
        button {
          background: #6fbed1;
          color: #0c2228;
        }
        button:hover {
          background: #8fcedb;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1 data-sk="Si offline" data-en="You're offline">Si offline</h1>
      <p
        data-sk="Skontroluj pripojenie a skús to znova."
        data-en="Check your connection and try again."
      >
        Skontroluj pripojenie a skús to znova.
      </p>
      <button onclick="window.location.reload()" data-sk="Skúsiť znova" data-en="Try again">
        Skúsiť znova
      </button>
    </div>
  </body>
</html>
