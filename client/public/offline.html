<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B5E20" />
    <title>Pawly – Offline</title>
    <script>
      (function () {
        var lang = (navigator.language || 'sk').toLowerCase().slice(0, 2) === 'en' ? 'en' : 'sk';
        document.documentElement.lang = lang;
        document.addEventListener('DOMContentLoaded', function () {
          document.querySelectorAll('[data-' + lang + ']').forEach(function (el) {
            el.textContent = el.getAttribute('data-' + lang);
          });
        });
      })();
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', 'Roboto', 'Helvetica', 'Arial', sans-serif;
        background: #fafafa;
        color: #1c1b1f;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
      }
      .container {
        max-width: 400px;
      }
      .icon {
        font-size: 72px;
        margin-bottom: 24px;
        opacity: 0.6;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 12px;
        color: #1b5e20;
      }
      p {
        font-size: 1rem;
        line-height: 1.6;
        color: #49454f;
        margin-bottom: 32px;
      }
      button {
        background: #1b5e20;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px 32px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #2e7d32;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #121212;
          color: #e6e1e5;
        }
        p {
          color: #cac4d0;
        }
        h1 {
          color: #81c784;
        }
        button {
          background: #388e3c;
        }
        button:hover {
          background: #4caf50;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1 data-sk="Si offline" data-en="You're offline">Si offline</h1>
      <p
        data-sk="Skontroluj pripojenie a skús to znova."
        data-en="Check your connection and try again."
      >
        Skontroluj pripojenie a skús to znova.
      </p>
      <button onclick="window.location.reload()" data-sk="Skúsiť znova" data-en="Try again">
        Skúsiť znova
      </button>
    </div>
  </body>
</html>
